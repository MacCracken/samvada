name: Release

on:
  push:
    # Accept both `v1.2.3` and `1.2.3` tag styles. The version-
    # verify step below enforces semver shape + match against
    # the VERSION file.
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  build:
    name: Build Release
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify version
        run: |
          FILE_VERSION=$(tr -d '[:space:]' < VERSION)
          TAG="${GITHUB_REF_NAME#v}"   # strip optional leading 'v' so v1.3.0 == 1.3.0
          echo "$TAG" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$' || {
            echo "tag ($TAG) is not semver x.y.z"; exit 1; }
          [ "$FILE_VERSION" = "$TAG" ] || {
            echo "VERSION ($FILE_VERSION) != tag ($TAG)"; exit 1; }
          echo "Version verified: $TAG (cyrius.cyml pulls from VERSION via \${file:VERSION})"

      - name: Install Cyrius toolchain
        run: |
          CYRIUS_VERSION="${CYRIUS_VERSION:-$(grep -oP '(?<=^cyrius = ")[^"]+' cyrius.cyml)}"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sfLO "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          tar xzf "cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          CYRIUS_DIR="cyrius-$CYRIUS_VERSION-x86_64-linux"
          mkdir -p "$HOME/.cyrius/bin" "$HOME/.cyrius/lib"
          cp "$CYRIUS_DIR/bin/"* "$HOME/.cyrius/bin/" 2>/dev/null || true
          cp -r "$CYRIUS_DIR/lib/"* "$HOME/.cyrius/lib/" 2>/dev/null || true
          chmod +x "$HOME/.cyrius/bin/"* 2>/dev/null || true
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH
          echo "CYRIUS_HOME=$HOME/.cyrius" >> $GITHUB_ENV

      - name: Resolve deps
        run: |
          rm -rf lib
          mkdir lib
          cyrius deps

      - name: Build
        run: |
          mkdir -p build
          cyrius build src/main.cyr build/samvada
          echo "samvada: $(wc -c < build/samvada) bytes"

      - name: Test
        run: cyrius test

      - name: Regenerate dist bundle
        run: cyrius distlib

      - name: Clean toolchain artifacts
        run: rm -f cyrius-*.tar.gz

      - name: Archive
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          # Source tarball (matches yukti's pattern — consumers
          # who want to build from scratch grab this).
          git archive --format=tar.gz --prefix="samvada-${TAG}/" -o "samvada-${TAG}-src.tar.gz" HEAD
          # Bundled lib for [deps.samvada] consumers — same file
          # as dist/samvada.cyr, renamed with version suffix so
          # it survives outside the source tree.
          cp dist/samvada.cyr "samvada-${TAG}.cyr"
          # Standalone smoke binary so contributors can verify
          # the build without a Cyrius toolchain.
          cp build/samvada "samvada-${TAG}-x86_64-linux"
          # C shim is just a .c file — ship it next to the bundle
          # so consumers that point at this release artifact
          # don't have to clone the repo to get the shim.
          cp deps/samvada_main.c "samvada-${TAG}-shim.c"
          sha256sum samvada-*.tar.gz samvada-*.cyr samvada-*-linux samvada-*-shim.c > SHA256SUMS

      - uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            samvada-*.tar.gz
            samvada-*.cyr
            samvada-*-linux
            samvada-*-shim.c
            SHA256SUMS

  release:
    name: Create GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: release-artifacts
      - name: Changelog
        # Extract the section between `## [TAG]` and the next
        # `## [` heading so the release body shows just this
        # version's notes.
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          awk "/^## \\[${TAG}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md > /tmp/body.md
      - uses: softprops/action-gh-release@v2
        with:
          name: "samvada ${{ github.ref_name }}"
          body_path: /tmp/body.md
          # 0.x tags ship as prereleases — surface gates aren't
          # met yet (no live-bus e2e through a consumer).
          prerelease: ${{ startsWith(github.ref_name, '0.') || startsWith(github.ref_name, 'v0.') }}
          files: |
            samvada-*.tar.gz
            samvada-*.cyr
            samvada-*-linux
            samvada-*-shim.c
            SHA256SUMS
